<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#9dd8f4">
    <title>不吃蔬菜</title>
    <link rel="stylesheet" href="./styles.css?v=3">
  </head>
  <body>
    <main class="phone-shell" aria-label="不吃蔬菜">
      <canvas id="game" width="720" height="720" aria-label="不吃蔬菜游戏画面"></canvas>
      <section id="start-screen" aria-label="游戏开始">
        <div class="start-cloud start-cloud-a"></div>
        <div class="start-cloud start-cloud-b"></div>
        <h1>不吃蔬菜</h1>
        <button id="start" type="button">开始游戏</button>
      </section>
      <button id="restart" type="button" aria-label="重新开始">↻</button>
    </main>
    <script src="./game.js?v=3"></script>
  </body>
</html>
